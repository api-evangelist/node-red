aid: node-red
name: Node-RED
description: >-
  Node-RED is an open source flow-based programming tool for wiring together
  hardware devices, APIs, and online services. The runtime exposes an Admin
  HTTP API used by the Node-RED Editor and the command-line admin tool to
  manage flows, nodes, settings, diagnostics, and authentication.
